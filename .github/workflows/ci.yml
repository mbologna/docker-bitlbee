name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  docker:
    uses: mbologna/.github/.github/workflows/docker-ci.yml@af64a3169c2eb27c42434346d87d7116b44ec401 # main
    with:
      image_name: docker-bitlbee
      yamllint_paths: docker-compose.yml .github/workflows/
      enable_integration_test: true
      enable_release_drafter: true
    secrets: inherit

  auto-release:
    if: github.event_name == 'schedule'
    needs: [docker]
    uses: mbologna/.github/.github/workflows/auto-release.yml@b76cd3762a1b6787ae79e88f7c012b2dc848f325 # main
    with:
      strategy: docker
      image: docker.io/mbologna/docker-bitlbee
    secrets: inherit
