---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bitlbee-data
  namespace: bitlbee
  labels:
    app.kubernetes.io/name: bitlbee
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # conduwuit (RocksDB) + mautrix-meta (SQLite) + BitlBee data need more than the old 128Mi
      storage: 1Gi
  # Uncomment and adjust for your storage class
  # storageClassName: standard
