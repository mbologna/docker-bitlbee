# Optional: expose BitlBee externally via NodePort or LoadBalancer.
# IRC is a raw TCP protocol — standard HTTP/HTTPS Ingress controllers do not
# support it. Use a NodePort or a cloud LoadBalancer instead.

# ---
# apiVersion: v1
# kind: Service
# metadata:
#   name: bitlbee-nodeport
#   namespace: bitlbee
#   labels:
#     app.kubernetes.io/name: bitlbee
#     app.kubernetes.io/component: gateway
# spec:
#   type: NodePort
#   ports:
#     - name: ircs
#       protocol: TCP
#       port: 6697
#       targetPort: ircs
#       nodePort: 30697  # Choose a port in the 30000-32767 range
#   selector:
#     app.kubernetes.io/name: bitlbee
#     app.kubernetes.io/component: gateway
#   sessionAffinity: ClientIP

# ---
# For cloud environments with LoadBalancer support:
# apiVersion: v1
# kind: Service
# metadata:
#   name: bitlbee-loadbalancer
#   namespace: bitlbee
#   labels:
#     app.kubernetes.io/name: bitlbee
#     app.kubernetes.io/component: gateway
#   annotations:
#     # Cloud-specific annotations, e.g., for AWS:
#     # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
#     # service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
# spec:
#   type: LoadBalancer
#   ports:
#     - name: ircs
#       protocol: TCP
#       port: 6697
#       targetPort: ircs
#   selector:
#     app.kubernetes.io/name: bitlbee
#   sessionAffinity: ClientIP
