---
apiVersion: v1
kind: Service
metadata:
  name: bitlbee
  namespace: bitlbee
  labels:
    app.kubernetes.io/name: bitlbee
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: ircs
      protocol: TCP
      port: 6697
      targetPort: ircs
  selector:
    app.kubernetes.io/name: bitlbee
    app.kubernetes.io/component: gateway
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
