---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitlbee
  namespace: bitlbee
  labels:
    app.kubernetes.io/name: bitlbee
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "latest"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bitlbee
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bitlbee
        app.kubernetes.io/component: gateway
        app.kubernetes.io/version: "latest"
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        # s6-overlay requires root at startup to set up supervision;
        # each service drops to uid 1000 (bitlbee) via s6-setuidgid in its run script.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: bitlbee
          image: docker.io/mbologna/docker-bitlbee:latest
          imagePullPolicy: Always

          ports:
            - name: ircs
              containerPort: 6697
              protocol: TCP

          envFrom:
            - configMapRef:
                name: bitlbee-config

          volumeMounts:
            - name: data
              mountPath: /var/lib/bitlbee

          resources:
            limits:
              # Container runs 4 processes: conduwuit + mautrix-meta + bitlbee + stunnel
              memory: 1Gi
              cpu: 1500m
            requests:
              memory: 256Mi
              cpu: 200m

          livenessProbe:
            exec:
              command:
                - /usr/local/bin/healthcheck.sh
            # Allow time for conduwuit + mautrix-meta + stunnel to initialize before BitlBee starts
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - /usr/local/bin/healthcheck.sh
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bitlbee-data
