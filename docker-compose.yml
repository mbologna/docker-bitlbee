---
services:
  bitlbee:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - docker.io/mbologna/docker-bitlbee:latest
    image: docker.io/mbologna/docker-bitlbee:latest
    container_name: bitlbee
    restart: unless-stopped

    ports:
      - "${BITLBEE_PORT:-6697}:6697"

    volumes:
      - bitlbee-data:/var/lib/bitlbee

    user: "${UID:-1000}:${GID:-1000}"

    environment:
      - TZ=${TZ:-UTC}
      # Optional: fix the Matrix registration token (auto-generated if unset)
      - MATRIX_REGISTRATION_TOKEN=${MATRIX_REGISTRATION_TOKEN:-}

    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Allow extra time for conduwuit + mautrix-meta first-run init
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

    networks:
      - bitlbee-net

    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
          cpus: "0.25"

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

networks:
  bitlbee-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  bitlbee-data:
    driver: local
